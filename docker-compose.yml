services:
  ghost-processing:
    build: .
    platform: linux/amd64  # Synology is Intel x86_64
    ports:
      - "5001:5001"         # Access web UI at http://NAS_IP:5001
    volumes:
      # Source audio — update these paths to match your NAS layout
      - /volume1/Stems:/data/stems           # Mount entire Stems volume
      # Logs and saved settings persist on host
      - ./logs:/app/logs
      - ./profile.json:/app/profile.json
    environment:
      - HOST=0.0.0.0
      - PORT=5001
    restart: unless-stopped  # Keep running so UI is always available
