services:
  ghost-processing:
    build: .
    container_name: ghost-processing
    platform: linux/amd64  # Synology is Intel x86_64
    ports:
      - "5001:5001"         # Access web UI at http://NAS_IP:5001
    volumes:
      # Source audio — update paths to match your NAS layout
      - /volume1/Stems:/data/stems           # Source stems (read)
      - /volume1/Converted:/data/converted   # Converted output (write)
      # Logs and saved settings persist on host
      - ./logs:/app/logs
      - ./profile.json:/app/profile.json     # Create this file first: echo '{}' > profile.json
      - ./last_job.json:/app/last_job.json   # Create this file first: echo '{}' > last_job.json
    environment:
      - HOST=0.0.0.0
      - PORT=5001
    restart: unless-stopped  # Keep running so UI is always available
